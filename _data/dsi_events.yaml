- title: "Open Talks: Psychology, Environment & Justice"
  description: Open Talks offers an open and non-judgmental space for reflection
    and discussion on key social transformations of our time. Each session
    invites researchers, students, and citizens to think together about how
    digitalisation, mobility, and technology are reshaping our societies and
    daily lives.
