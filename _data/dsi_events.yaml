- title: Risk & Resilience Festival - Digital Autonomy
  description: "On Thursday, 5 November 2026, the campus of the University of
    Twente will host the Risk & Resilience Festival. This edition focuses on a
    theme that is becoming increasingly urgent for organisations and
    governments: digital autonomy."
