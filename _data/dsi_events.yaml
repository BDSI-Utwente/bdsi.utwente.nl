- title: "DSI Meet Up: Seminar Series on Computer Vision"
  description: This DSI Meet Up focuses on Pure Motion for Video Analysis,
    exploring how motion based representations can improve the way computer
    vision models analyse and understand video. The series is co-organised by
    members of the DMB group and collaborating colleagues across the University
    of Twente.
